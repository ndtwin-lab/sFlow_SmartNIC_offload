##########################################
# Parser                                 #
##########################################

parser :
    type : parser
    format : dot
    start_state : "start"
    implementation : >-
        digraph {
            start -> eth_parse [value="default", mask="none", order="0"]
            eth_parse -> parse_ipv4 [value="0x800", mask="none", order="0"]
            eth_parse -> _condition_0 [value="default", mask="none", order="1"]
            parse_ipv4 -> parse_udp [value="0x11", mask="none", order="0"]
            parse_ipv4 -> _condition_0 [value="default", mask="none", order="1"]
            parse_udp -> parse_sflow_header [value="0x18c7", mask="none", order="0"]
            parse_udp -> _condition_0 [value="default", mask="none", order="1"]
            parse_sflow_header -> _condition_0 [value="0x0", mask="none", order="0"]
            parse_sflow_header -> parse_sflow_sample_header [value="default", mask="none", order="1"]
            parse_sflow_sample_header -> parse_sflow_counter [value="0x2", mask="none", order="0"]
            parse_sflow_sample_header -> parse_sflow_sample [value="0x5", mask="none", order="1"]
            parse_sflow_sample_header -> _condition_0 [value="default", mask="none", order="2"]
            parse_sflow_counter -> _condition_0 [value="0x1", mask="none", order="0"]
            parse_sflow_counter -> parse_sflow_counter_2 [value="default", mask="none", order="1"]
            parse_sflow_sample -> _condition_0 [value="0x1", mask="none", order="0"]
            parse_sflow_sample -> parse_sflow_sample_2 [value="default", mask="none", order="1"]
            parse_sflow_counter_2 -> _condition_0 [value="default", mask="none", order="0"]
            parse_sflow_sample_2 -> _condition_0 [value="default", mask="none", order="0"]
        }

